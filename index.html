<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Game Picker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

</head>

<body>
    <main>
        <header>
            <h1> Board Game Picker</h1>
        </header>
        <div id="infoUser">
            <p>Quantas pessoas vão jogar?</p>
            <input id="qtdJogadores" type="number" placeholder="0">
            <p>Quantos minutos tem disponivel?</p>
            <input id="qtdTempo" type="number" placeholder="0">
            <br>
            <button id="btnSortear">Sortear</button>
            <p id="resultado"></p>
        </div>

    </main>
    <script src="script.js"></script>
</body>

</html>
